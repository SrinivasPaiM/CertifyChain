{% extends 'base.html' %}

{% block title %}Generate Certificate - CertifyChain{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <h1 class="text-center mb-5">Generate Refugee Certificate</h1>
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="recipient_address" class="form-label">Recipient Address (Ethereum)</label>
                                <input type="text" class="form-control" id="recipient_address" name="recipient_address" required>
                            </div>
                            <div class="mb-3">
                                <label for="refugee_name" class="form-label">Refugee Name</label>
                                <input type="text" class="form-control" id="refugee_name" name="refugee_name" required>
                            </div>
                            <div class="mb-3">
                                <label for="country" class="form-label">Country of Origin</label>
                                <input type="text" class="form-control" id="country" name="country" required>
                            </div>
                            <div class="mb-3">
                                <label for="date_of_birth" class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" required>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" name="address" required>
                            </div>
                            <div class="mb-3">
                                <label for="gender" class="form-label">Gender</label>
                                <select class="form-select" id="gender" name="gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="certificate_data" class="form-label">Certificate Data</label>
                                <textarea class="form-control" id="certificate_data" name="certificate_data" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="issuing_date" class="form-label">Issuing Date</label>
                                <input type="date" class="form-control" id="issuing_date" name="issuing_date" required>
                            </div>
                            <div class="mb-3">
                                <label for="valid_until" class="form-label">Valid Until</label>
                                <input type="date" class="form-control" id="valid_until" name="valid_until" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Generate Certificate</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
