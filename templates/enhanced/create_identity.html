<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Identity - CertifyChain SSI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-gradient { background: linear-gradient(135deg, #667eea, #764ba2); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🔐 CertifyChain SSI</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/ssi/">Dashboard</a>
            </div>
        </div>
    </nav>

    <section class="hero-gradient py-4">
        <div class="container">
            <h1 class="display-5 fw-bold text-white">📝 Create Decentralized Identity</h1>
            <p class="text-white">Generate your Self-Sovereign Identity (SSI)</p>
        </div>
    </section>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Wallet Address</h5>
                    </div>
                    <div class="card-body">
                        <form id="identityForm">
                            <div class="mb-3">
                                <label class="form-label">Ethereum Address (Optional)</label>
                                <input type="text" class="form-control" name="eth_address" placeholder="0x...">
                                <small class="text-muted">Leave blank to auto-generate</small>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create DID</button>
                        </form>
                        
                        <div class="mt-4" id="result" style="display:none;">
                            <div class="alert alert-success">
                                <h6>Identity Created!</h6>
                                <p class="mb-1"><strong>DID:</strong> <small id="didResult"></small></p>
                                <p class="mb-0"><strong>Status:</strong> <span id="statusResult"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('identityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const response = await fetch('/ssi/create/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            document.getElementById('result').style.display = 'block';
            document.getElementById('didResult').textContent = result.did;
            document.getElementById('statusResult').textContent = result.status;
        });
    </script>
</body>
</html>
