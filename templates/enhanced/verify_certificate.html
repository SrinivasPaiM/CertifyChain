<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate - CertifyChain SSI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-gradient { background: linear-gradient(135deg, #11998e, #38ef7d); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🔐 CertifyChain SSI</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/ssi/">Dashboard</a>
            </div>
        </div>
    </nav>

    <section class="hero-gradient py-4">
        <div class="container">
            <h1 class="display-5 fw-bold text-white">✅ Verify Certificate & Create DID</h1>
            <p class="text-white">Step 1: Verify your certificate | Step 2: Create your identity</p>
        </div>
    </section>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Enter Your Certificate ID</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Get your Certificate ID from the admin after verification.</p>
                        <form id="verifyForm">
                            <div class="mb-3">
                                <label class="form-label">Certificate ID</label>
                                <input type="text" class="form-control" name="certificate_id" placeholder="e.g., REF-JOH-1234567890" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Verify Certificate</button>
                        </form>
                        
                        <div class="mt-4" id="result" style="display:none;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const response = await fetch('/ssi/verify/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            
            if (result.valid) {
                let html = '<div class="alert alert-success"><strong>✅ Certificate Verified!</strong></div>';
                html += '<p><strong>Name:</strong> ' + result.refugee_name + '</p>';
                html += '<p><strong>Country:</strong> ' + result.country + '</p>';
                
                if (result.has_did) {
                    html += '<div class="alert alert-info"><strong>You already have a DID:</strong><br>' + result.did + '</div>';
                    html += '<a href="/services/match/?certificate_id=' + result.certificate_id + '" class="btn btn-success">Go to AI Matching</a>';
                } else {
                    html += '<p class="text-success">Now create your DID!</p>';
                    html += '<button onclick="createDID(\'' + result.certificate_id + '\')" class="btn btn-primary w-100">Create Decentralized Identity (DID)</button>';
                }
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = '<div class="alert alert-danger"><strong>❌ ' + result.message + '</strong></div>';
            }
        });
        
        async function createDID(certId) {
            const response = await fetch('/ssi/create/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({certificate_id: certId})
            });
            
            const result = await response.json();
            const resultDiv = document.getElementById('result');
            
            if (result.did) {
                resultDiv.innerHTML = '<div class="alert alert-success"><strong>🎉 DID Created Successfully!</strong></div>' +
                    '<p><strong>Your DID:</strong><br><code>' + result.did + '</code></p>' +
                    '<p><strong>Status:</strong> ' + result.status + '</p>' +
                    '<div class="mt-3">' +
                    '<a href="/services/match/?certificate_id=' + certId + '" class="btn btn-success">Next: AI Service Matching</a>' +
                    '</div>';
            } else {
                resultDiv.innerHTML = '<div class="alert alert-danger"><strong>Error:</strong> ' + result.message + '</div>';
            }
        }
    </script>
</body>
</html>
